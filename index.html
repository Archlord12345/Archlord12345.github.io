  <style>

    :root {
      --gold:   #f6bd60;
      --cyan:   #84dcc6;
      --blue:   #a9def9;
      --purple: #e4c1f9;

    }

    html, body {

    #three-canvas {

    /* ─── Navigation ─────────────────────────────────────── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(3,7,17,.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(132,220,198,.1);
    }

    #nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: #fff;
    }

    #nav-logo-icon {

      background: linear-gradient(135deg, var(--gold), var(--red));

      flex-shrink: 0;

    #nav-name {

      letter-spacing: .1em; text-transform: uppercase;
    }

    #nav-right { display: flex; align-items: center; gap: 12px; }

    .nav-link {
      text-decoration: none;
      color: rgba(255,255,255,.55);
      font-size: 11px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      transition: color .2s;
    }
    .nav-link:hover { color: var(--cyan); }

    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px;
      border: 1px solid rgba(132,220,198,.35);
      border-radius: 12px;
      background: rgba(132,220,198,.08);
      color: var(--cyan);
      font-size: 11px; font-weight: 700;
      text-decoration: none;
      transition: background .2s;
    }
    .nav-btn:hover { background: rgba(132,220,198,.18); }

    /* ─── Planet labels (3D → 2D projected) ─────────────── */
    .label3d {
      position: fixed;
      transform: translate(-50%, calc(-100% - 10px));
      padding: 3px 8px;
      background: rgba(0,0,0,.65);
      border-radius: 6px;
      font-size: 9px; font-weight: 700;

      pointer-events: none;
      backdrop-filter: blur(4px);

      transition: opacity .15s;
      z-index: 15;
      white-space: nowrap;
    }
    .label3d.visible { opacity: 1; }

    /* ─── Info Panel ──────────────────────────────────────── */
    #info-panel {
      position: fixed; top: 0; right: 0;
      width: min(440px, 100vw);
      height: 100%;
      background: rgba(4,8,24,.96);

    #panel-close:hover { background: rgba(255,255,255,.12); }

    #panel-color-block {
      width: 56px; height: 56px;
      border-radius: 14px;
      margin-bottom: 20px;
      transform: rotate(12deg);
      flex-shrink: 0;

    #panel-title {
      font-size: clamp(20px, 4vw, 28px);

      letter-spacing: -.01em;
      text-transform: uppercase;

      font-size: 10px; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      color: rgba(255,255,255,.28);
      pointer-events: none;
      animation: hint-pulse 2.5s ease-in-out infinite;
    }
    @keyframes hint-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ─── Overlay backdrop (close panel) ─────────────────── */
    #backdrop {
      position: fixed; inset: 0;
      z-index: 150;
      display: none;
    }
    #backdrop.show { display: block; }
  </style>
</head>

<script type="module">
'use strict';

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* =========================================================
   PROJECTS DATA
   ========================================================= */
const PROJECTS = [
  {
    id: 1,
    name: 'PROJET-WEBTOON',

  },
  {

    inclination: -22 * Math.PI / 180,
    initialAngle: 1.26,
    link: 'https://kernel-chat.vercel.app',

    badge: 'Vercel',

  },
  {
    id: 3,

    description: 'Portfolio 3D immersif créé avec Three.js et React Three Fiber, présentant les projets sous forme de système solaire interactif avec orbites animées.',
    tech: ['Next.js', 'Three.js', 'React Three Fiber', 'TypeScript'],
    color: '#84dcc6',
    orbitR: 124,
    size: 5,
    speed: 0.30,
    inclination: 10 * Math.PI / 180,
    initialAngle: 2.51,
    link: 'https://rave-solar-system-portfolio.vercel.app',
    github: 'https://github.com/Archlord12345/rave-solar-system-portfolio',
    badge: 'Vercel',
    badgeBg: 'rgba(255,255,255,.07)',
    badgeColor: 'rgba(255,255,255,.8)',
  },
  {
    id: 4,
    name: 'PORFOLIO RAVEL',
    description: 'Portfolio personnel fullstack avec React et TypeScript, présentant mes compétences, expériences et projets avec animations CSS avancées.',
    tech: ['React', 'TypeScript', 'Vite', 'Tailwind CSS'],
    color: '#a9def9',
    orbitR: 158,
    size: 4.5,
    speed: 0.18,
    inclination: -16 * Math.PI / 180,
    initialAngle: 3.77,
    link: 'https://porfolioravel.vercel.app',
    github: 'https://github.com/Archlord12345/porfolioravel',
    badge: 'Vercel',
    badgeBg: 'rgba(255,255,255,.07)',
    badgeColor: 'rgba(255,255,255,.8)',
  },
  {
    id: 5,
    name: 'PJAVAINTERFACE',
    description: "Interface interactive pour visualiser et manipuler des structures de données Java. Outil pédagogique conçu pour faciliter l'apprentissage de la POO.",
    tech: ['TypeScript', 'React', 'Vite'],
    color: '#e4c1f9',
    orbitR: 192,
    size: 4,
    speed: 0.11,
    inclination: 28 * Math.PI / 180,
    initialAngle: 5.03,
    link: 'https://pjavainterface.vercel.app',
    github: 'https://github.com/Archlord12345/pjavainterface',
    badge: 'Vercel',
    badgeBg: 'rgba(255,255,255,.07)',
    badgeColor: 'rgba(255,255,255,.8)',
  },
];

/* =========================================================
   INFO PANEL
   ========================================================= */
function openPanel(p) {
  document.getElementById('panel-color-block').style.backgroundColor = p.color;
  document.getElementById('panel-title').textContent = p.name;
  document.getElementById('panel-description').textContent = p.description;

  const badge = document.getElementById('panel-badge');
  badge.textContent      = p.badge;
  badge.style.background = p.badgeBg;
  badge.style.color      = p.badgeColor;
  badge.style.border     = `1px solid ${p.badgeColor}55`;

  const techWrap = document.getElementById('panel-tech');
  techWrap.innerHTML = '';
  p.tech.forEach(t => {
    const span       = document.createElement('span');
    span.className   = 'tech-tag';
    span.textContent = t;
    techWrap.appendChild(span);
  });

  document.getElementById('panel-link').href   = p.link;
  document.getElementById('panel-github').href = p.github;
  document.getElementById('info-panel').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
}

window.closePanel = function () {
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closePanel(); });

/* =========================================================
   THREE.JS SCENE SETUP
   ========================================================= */
const canvas   = document.getElementById('three-canvas');
const scene    = new THREE.Scene();

const camera   = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
camera.position.set(0, 90, 265);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x030711, 1);

/* ─── Orbit controls ──────────────────────────────────────── */
const controls             = new OrbitControls(camera, renderer.domElement);
controls.enableDamping     = true;
controls.dampingFactor     = 0.05;
controls.autoRotate        = true;
controls.autoRotateSpeed   = 0.35;
controls.minDistance       = 80;
controls.maxDistance       = 600;
controls.target.set(0, 0, 0);

/* =========================================================
   LIGHTING
   ========================================================= */
scene.add(new THREE.AmbientLight(0x112233, 1.2));
const sunLight = new THREE.PointLight(0xffd070, 3.5, 700, 1.5);
scene.add(sunLight);

/* =========================================================
   GLOW TEXTURE HELPER
   ========================================================= */
function makeGlowTexture(hexColor) {
  const c   = document.createElement('canvas');
  c.width   = c.height = 128;
  const ctx = c.getContext('2d');
  const r   = parseInt(hexColor.slice(1, 3), 16);
  const g   = parseInt(hexColor.slice(3, 5), 16);
  const b   = parseInt(hexColor.slice(5, 7), 16);
  const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  grad.addColorStop(0,   `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.3, `rgba(${r},${g},${b},0.45)`);
  grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}

/* =========================================================
   STARS (point cloud on a large sphere shell)
   ========================================================= */
{
  const COUNT = 5000;
  const pos   = new Float32Array(COUNT * 3);
  for (let i = 0; i < COUNT; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 1500 + Math.random() * 500;
    pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 1.6, sizeAttenuation: true,
    transparent: true, opacity: 0.85,
  })));
}

/* =========================================================
   SUN
   ========================================================= */
const SUN_R  = 22;
const sunMat = new THREE.MeshStandardMaterial({
  color: 0xf6d370,
  emissive: new THREE.Color(0xf6a000),
  emissiveIntensity: 0.6,
  roughness: 0.7,
  metalness: 0,
});
const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(SUN_R, 64, 64), sunMat);
scene.add(sunMesh);

/* Load profile photo as texture on the sun */
new THREE.TextureLoader().load(
  'https://avatars.githubusercontent.com/u/237933821?v=4',
  tex => {
    sunMat.map               = tex;
    sunMat.emissiveIntensity = 0.25;
    sunMat.needsUpdate       = true;
  },
  undefined,
  () => { /* fallback: stay as golden sphere */ }
);

/* Sun glow — two layered sprites */
const sunGlow1 = new THREE.Sprite(new THREE.SpriteMaterial({
  map: makeGlowTexture('#f6bd60'),
  blending: THREE.AdditiveBlending,
  transparent: true, depthWrite: false,
}));
sunGlow1.scale.set(SUN_R * 6, SUN_R * 6, 1);
scene.add(sunGlow1);

const sunGlow2 = new THREE.Sprite(new THREE.SpriteMaterial({
  map: makeGlowTexture('#f08000'),
  blending: THREE.AdditiveBlending,
  transparent: true, depthWrite: false, opacity: 0.4,
}));
sunGlow2.scale.set(SUN_R * 11, SUN_R * 11, 1);
scene.add(sunGlow2);

/* =========================================================
   PLANETS + ORBIT RINGS
   ========================================================= */
const planetMeshes    = [];
const glowSprites     = [];
const labelEls        = [];
const labelsContainer = document.getElementById('labels-container');

PROJECTS.forEach(p => {
  /* Orbit pivot — tilt defines the inclination of the orbital plane */
  const pivot       = new THREE.Object3D();
  pivot.rotation.x  = p.inclination;
  scene.add(pivot);

  /* Dashed orbit ring in the pivot's local XZ plane */
  const orbitPts = [];
  for (let j = 0; j <= 128; j++) {
    const a = (j / 128) * Math.PI * 2;
    orbitPts.push(new THREE.Vector3(Math.cos(a) * p.orbitR, 0, Math.sin(a) * p.orbitR));
  }
  const ringGeo = new THREE.BufferGeometry().setFromPoints(orbitPts);
  const ringMat = new THREE.LineDashedMaterial({
    color: new THREE.Color(p.color),
    transparent: true, opacity: 0.28,
    dashSize: 3, gapSize: 6,
  });
  const ring = new THREE.Line(ringGeo, ringMat);
  ring.computeLineDistances();
  pivot.add(ring);

  /* Planet sphere */
  const pColor = new THREE.Color(p.color);
  const pMesh  = new THREE.Mesh(
    new THREE.SphereGeometry(p.size, 32, 32),
    new THREE.MeshStandardMaterial({
      color: pColor,
      emissive: pColor,
      emissiveIntensity: 0.55,
      roughness: 0.55,
      metalness: 0.05,
    })
  );
  pMesh.userData.projectData = p;
  pivot.add(pMesh);
  planetMeshes.push(pMesh);

  /* Per-planet glow sprite — positioned in world space each frame */
  const gSprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeGlowTexture(p.color),
    blending: THREE.AdditiveBlending,
    transparent: true, depthWrite: false, opacity: 0.75,
  }));
  gSprite.scale.set(p.size * 5, p.size * 5, 1);
  scene.add(gSprite);
  glowSprites.push(gSprite);

  /* HTML label — positioned each frame via 3D→2D projection */
  const el       = document.createElement('div');
  el.className   = 'label3d';
  el.textContent = p.name;
  labelsContainer.appendChild(el);
  labelEls.push(el);
});

/* =========================================================
   INTERACTION — RAYCASTER
   ========================================================= */
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
let hoveredIdx  = -1;
let dragOrigin  = null;

function updateMouse(e) {
  const rect = canvas.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
}

/* Hover: highlight planet + show label */
canvas.addEventListener('mousemove', e => {
  updateMouse(e);
  raycaster.setFromCamera(mouse, camera);
  const hits   = raycaster.intersectObjects(planetMeshes);
  const newIdx = hits.length ? planetMeshes.indexOf(hits[0].object) : -1;

  if (newIdx !== hoveredIdx) {
    if (hoveredIdx >= 0) {
      planetMeshes[hoveredIdx].scale.setScalar(1);
      labelEls[hoveredIdx].classList.remove('visible');
    }
    hoveredIdx = newIdx;
    if (hoveredIdx >= 0) {
      planetMeshes[hoveredIdx].scale.setScalar(1.7);
      labelEls[hoveredIdx].classList.add('visible');
      document.body.style.cursor = 'pointer';
    } else {
      document.body.style.cursor = '';
    }
  }
});

/* Distinguish click from orbit-drag */
canvas.addEventListener('mousedown', e => { dragOrigin = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('click', e => {
  if (!dragOrigin) return;
  const dx = e.clientX - dragOrigin.x;
  const dy = e.clientY - dragOrigin.y;
  dragOrigin = null;
  if (Math.sqrt(dx * dx + dy * dy) >= 5) return;   /* was a drag, not a click */

  updateMouse(e);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(planetMeshes);
  if (hits.length) openPanel(hits[0].object.userData.projectData);
});

/* =========================================================
   ANIMATION LOOP
   ========================================================= */
const _wp  = new THREE.Vector3();   /* world position  */
const _ndc = new THREE.Vector3();   /* NDC projection  */

function animate(t) {
  requestAnimationFrame(animate);
  controls.update();

  /* Update planet positions, glow sprites, and HTML labels */
  PROJECTS.forEach((p, i) => {
    const angle = p.initialAngle + t * 0.001 * p.speed * 0.4;
    const mesh  = planetMeshes[i];
    mesh.position.set(Math.cos(angle) * p.orbitR, 0, Math.sin(angle) * p.orbitR);

    /* World position for glow + label */
    mesh.getWorldPosition(_wp);
    glowSprites[i].position.copy(_wp);

    /* Project to screen for HTML label */
    _ndc.copy(_wp).project(camera);
    labelEls[i].style.left = ((_ndc.x * .5 + .5) * window.innerWidth)  + 'px';
    labelEls[i].style.top  = ((-_ndc.y * .5 + .5) * window.innerHeight) + 'px';
  });

  /* Slow sun axial rotation */
  sunMesh.rotation.y = t * 0.00018;

  renderer.render(scene, camera);
}

/* =========================================================
   RESIZE
   ========================================================= */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

requestAnimationFrame(animate);
</script>
</body>
